<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenZ · 模型切换面板</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F5F5F7;
    --surface-2: #EDEDF0;
    --border: #E5E5EA;
    --fg: #1C1C1E;
    --fg-2: #3C3C43;
    --fg-3: #8E8E93;
    --primary: #1A66FF;
    --primary-2: #1452CC;
    --primary-soft: #EAF1FF;
    --grad-blue: linear-gradient(135deg, #1A66FF 0%, #4A8BFF 100%);
    --radius: 12px;
    --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: #0A0A0A; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 0;
    margin: 0; -webkit-font-smoothing: antialiased; color: var(--fg); overflow: hidden; }

  /* iPhone frame */
  .iphone { width: 393px; height: 852px; background: #0A0A0A; border-radius: 55px; padding: 11px;
    box-shadow: 0 0 0 1.5px #2A2A2C, 0 0 0 4px #0F0F10, 0 30px 80px rgba(0,0,0,0.25); position: relative; }
  .screen { width: 100%; height: 100%; background: var(--bg); border-radius: 44px; overflow: hidden;
    position: relative; display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 35px; background: #000; border-radius: 20px; z-index: 200; }
  .status { height: 54px; padding: 18px 32px 0; display: flex; align-items: center;
    justify-content: space-between; font-size: 17px; font-weight: 600; color: var(--fg); flex-shrink: 0; }
  .status-right { display: flex; align-items: center; gap: 5px; }

  /* 灰化背景（被遮罩压暗的首页） */
  .home-bg {
    flex: 1; background: linear-gradient(180deg, #FFFFFF 0%, #F5F5F7 100%);
    position: relative; filter: brightness(0.7);
  }
  .home-bg::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.15);
  }
  .app { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* 顶部导航（保持可见） */
  .topbar { display: flex; align-items: center; gap: 8px;
    padding: 4px 14px 12px; flex-shrink: 0; position: relative; z-index: 5; }
  .icon-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.9); border: none;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--fg); }
  .pill { display: flex; align-items: center; gap: 5px;
    padding: 6px 0; background: transparent; border: none;
    font-size: 14px; font-family: var(--font);
    cursor: pointer; transition: opacity 150ms ease; }
  .pill:active { opacity: 0.55; }
  .pill-name { font-weight: 600; color: var(--fg); letter-spacing: -0.005em; }
  .pill-meta { font-weight: 500; color: var(--fg-3); letter-spacing: -0.005em; }
  .pill-arrow { width: 11px; height: 11px; color: var(--fg-3); }
  .topbar-right { display: flex; gap: 2px; margin-left: auto; }

  /* 背景层 dimmed 状态下的输入框仍保持多行（视觉一致） */

  /* Bottom sheet */
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
    max-height: 75%;
    display: flex; flex-direction: column;
    z-index: 50;
  }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--surface-2);
    border-radius: 2px; margin: 8px auto 4px;
  }
  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 18px 12px; flex-shrink: 0;
  }
  .sheet-title { font-size: 17px; font-weight: 700; color: var(--fg); }
  .sheet-sub { font-size: 12px; color: var(--fg-3); }
  .sheet-close {
    width: 28px; height: 28px; background: var(--surface);
    border: none; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--fg-2);
  }

  .sheet-body {
    flex: 1; overflow-y: auto; padding: 0 14px 20px;
    scrollbar-width: none;
  }
  .sheet-body::-webkit-scrollbar { display: none; }

  .section { margin-top: 14px; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0 4px; margin-bottom: 8px;
  }

  /* 模型/模式列表项 */
  .option {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    border: 1.5px solid transparent;
  }
  .option.active {
    background: var(--primary-soft);
    border-color: var(--primary);
  }
  .opt-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .opt-body { flex: 1; min-width: 0; }
  .opt-name { font-size: 15px; font-weight: 600; color: var(--fg); display: flex; align-items: center; gap: 6px; }
  .opt-desc { font-size: 12px; color: var(--fg-3); margin-top: 1px; }
  .opt-tag {
    font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
    background: #FFE8DB; color: #FF7A45;
  }
  .opt-tag-pro { background: linear-gradient(135deg, #1A66FF, #8B5CF6); color: white; }
  .opt-check {
    width: 20px; height: 20px; color: var(--fg-3); flex-shrink: 0;
  }
  .option.active .opt-check { color: var(--primary); }
</style>
</head>
<body>
<div class="iphone">
  <div class="screen">
    <div class="island"></div>

    <div class="status">
      <div>9:41</div>
      <div class="status-right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
          <rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/>
          <rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
          <path d="M8 11a1 1 0 100-2 1 1 0 000 2zM4.5 7.5a4.5 4.5 0 016.5 0l-1 1a3 3 0 00-4.5 0l-1-1zM1.5 4.5a9 9 0 0110 0l-1 1a7.5 7.5 0 00-8 0l-1-1z"/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="currentColor" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/>
          <rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="app">
      <!-- 灰化背景 + 顶部导航 -->
      <header class="topbar">
        <button class="icon-btn" aria-label="菜单">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
          </svg>
        </button>
        <button class="pill">
          <span class="pill-name">OpenZ</span>
          <span class="pill-meta">Z1 思考</span>
          <svg class="pill-arrow" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4,2 8,6 4,10"/>
          </svg>
        </button>
        <div class="topbar-right">
          <button class="icon-btn" aria-label="语音"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg></button>
          <button class="icon-btn" aria-label="新建"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </header>

      <div class="home-bg"></div>

      <!-- Bottom sheet -->
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <div>
            <div class="sheet-title">切换模型 / 模式</div>
            <div class="sheet-sub">选择后立即生效，下一条消息生效</div>
          </div>
          <button class="sheet-close" aria-label="关闭">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </button>
        </div>

        <div class="sheet-body">

          <!-- 段 1：基础模型 -->
          <div class="section">
            <div class="section-label">基础模型</div>

            <div class="option active">
              <div class="opt-icon" style="background: var(--grad-blue); color: white;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">OpenZ Z1 <span class="opt-tag opt-tag-pro">最新</span></div>
                <div class="opt-desc">长文档 · 多步推理 · 工具调用</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #F0E7FE; color: #8B5CF6;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">OpenZ Z0.9 <span class="opt-tag">稳定</span></div>
                <div class="opt-desc">通用对话 · 速度更快</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #E1F4E9; color: #34A853;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">OpenZ Z2 Preview</div>
                <div class="opt-desc">实验模型 · 需要 Pro 权限</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>
          </div>

          <!-- 段 2：推理模式 -->
          <div class="section">
            <div class="section-label">推理模式</div>

            <div class="option active">
              <div class="opt-icon" style="background: #FFF7E5; color: #FF9500;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">深度思考</div>
                <div class="opt-desc">显示思考过程 · 适合复杂问题</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #EAF1FF; color: #1A66FF;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">快速</div>
                <div class="opt-desc">直接回答 · 响应更快</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #E1F4E9; color: #34A853;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">联网</div>
                <div class="opt-desc">实时检索 · 引用网页来源</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #FFE8DB; color: #FF7A45;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
              </div>
              <div class="opt-body">
                <div class="opt-name">专业领域</div>
                <div class="opt-desc">调用垂直 Agent · 法律/医疗/代码</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>
          </div>

          <!-- 段 3：Agent 人格 -->
          <div class="section">
            <div class="section-label">Agent 人格</div>

            <div class="option active">
              <div class="opt-icon" style="background: var(--grad-blue); color: white; font-weight: 700;">K</div>
              <div class="opt-body">
                <div class="opt-name">OpenZ 默认</div>
                <div class="opt-desc">理性 · 友好 · 信息密度高</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #FFE8DB; color: #FF7A45; font-weight: 700;">小</div>
              <div class="opt-body">
                <div class="opt-name">小火 · 创意</div>
                <div class="opt-desc">活泼 · 适合头脑风暴</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>

            <div class="option">
              <div class="opt-icon" style="background: #F0E7FE; color: #8B5CF6; font-weight: 700;">博</div>
              <div class="opt-body">
                <div class="opt-name">博士 · 严谨</div>
                <div class="opt-desc">学术 · 引用规范 · 长文写作</div>
              </div>
              <svg class="opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
