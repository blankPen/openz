<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>火山引擎 TTS 流式播放 Demo</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 4px;
      }
      .hint {
        color: #888;
        font-size: 13px;
        margin-bottom: 24px;
      }
      textarea {
        width: 100%;
        min-height: 100px;
        padding: 8px 10px;
        font-size: 15px;
        font-family: inherit;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        resize: vertical;
      }
      .row {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        padding: 8px 16px;
        font-size: 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #2563eb;
        color: white;
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      button.stop {
        background: #dc2626;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
        color: #555;
        min-height: 1.4em;
      }
      #status.error {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>火山引擎 TTS 流式播放 Demo</h1>
    <p class="hint">
      点击「播放」会向 <code>POST /api/tts</code> 发起请求，
      服务端把火山引擎返回的 PCM 字节流边收边推给浏览器，
      浏览器用 PCMPlayer 边收边喂给 AudioContext 实时播放。
    </p>

    <label for="text">要合成的文本：</label>
    <textarea id="text" placeholder="例如：今天天气不错，适合出门走走。">
你好，我是火山引擎的语音合成服务。今天天气怎么样？我推荐你试试豆包语音合成模型 2.0，效果更自然。好的，那就这样，再见！</textarea>

    <div class="row">
      <button id="playBtn">▶ 播放</button>
      <button id="stopBtn" class="stop" disabled>■ 停止</button>
      <label class="hint" style="user-select: none; cursor: pointer;">
        <input type="checkbox" id="simulateStream" />
        模拟 LLM 逐步生成(段间 250~750ms 随机延迟)
      </label>
    </div>
    <div id="status">就绪</div>
    <pre id="log" style="margin-top:14px;padding:10px;background:#0b1020;color:#d1d5db;
      font:12px/1.5 ui-monospace,Menlo,monospace;border-radius:6px;
      max-height:240px;overflow:auto;white-space:pre-wrap;"></pre>

    <script>
      // === PCM 播放器 ===
      // 来自用户提供的参考实现，已修正若干 typo（gainNode/analyserNode
      // 拆分、bufferSource.connect 完整链路、`==` 改 `===`），flush 间隔
      // 调整为 200ms 让首字延迟更低。
      class PCMPlayer {
        constructor(option) {
          this.init(option)
        }

        init(option) {
          const defaultOption = {
            inputCodec: 'Int16',
            channels: 1,
            sampleRate: 8000,
            flushTime: 200,
            fftSize: 2048,
          }
          this.option = Object.assign({}, defaultOption, option)
          this.samples = new Float32Array()
          this.interval = setInterval(
            this.flush.bind(this),
            this.option.flushTime,
          )
          this.convertValue = this.getConvertValue()
          this.typedArray = this.getTypedArray()
          this.initAudioContext()
          this.bindAudioContextEvent()
        }

        getConvertValue() {
          const inputCodecs = {
            Int8: 128,
            Int16: 32768,
            Int32: 2147483648,
            Float32: 1,
          }
          if (!inputCodecs[this.option.inputCodec]) {
            throw new Error(
              'wrong codec.please input one of these codecs:Int8,Int16,Int32,Float32',
            )
          }
          return inputCodecs[this.option.inputCodec]
        }

        getTypedArray() {
          const typedArrays = {
            Int8: Int8Array,
            Int16: Int16Array,
            Int32: Int32Array,
            Float32: Float32Array,
          }
          if (!typedArrays[this.option.inputCodec]) {
            throw new Error(
              'wrong codec.please input one of these codecs:Int8,Int16,Int32,Float32',
            )
          }
          return typedArrays[this.option.inputCodec]
        }

        initAudioContext() {
          this.audioCtx = new (window.AudioContext ||
            window.webkitAudioContext)()
          this.gainNode = this.audioCtx.createGain()
          this.analyserNode = this.audioCtx.createAnalyser()
          this.analyserNode.fftSize = this.option.fftSize
          this.gainNode.connect(this.analyserNode)
          this.gainNode.connect(this.audioCtx.destination)
        }

        static isTypedArray(data) {
          return (
            (data.byteLength &&
              data.buffer &&
              data.buffer.constructor === ArrayBuffer) ||
            data.constructor === ArrayBuffer
          )
        }

        isSupported(data) {
          if (!PCMPlayer.isTypedArray(data)) {
            throw new Error('请传入ArrayBuffer或者任意TypedArray')
          }
          return true
        }

        feed(data) {
          this.isSupported(data)
          data = this.getFormattedValue(data)
          const tmp = new Float32Array(this.samples.length + data.length)
          tmp.set(this.samples, 0)
          tmp.set(data, this.samples.length)
          this.samples = tmp
        }

        getFormattedValue(data) {
          let view
          if (data.constructor === ArrayBuffer) {
            view = new this.typedArray(data)
          } else {
            view = new this.typedArray(data.buffer)
          }
          const float32 = new Float32Array(view.length)
          for (let i = 0; i < view.length; i++) {
            float32[i] = view[i] / this.convertValue
          }
          return float32
        }

        volume(volume) {
          this.gainNode.gain.value = volume
        }

        destroy() {
          if (this.interval) clearInterval(this.interval)
          this.interval = null
          this.samples = null
          if (this.audioCtx) {
            this.audioCtx.close().catch(() => {})
            this.audioCtx = null
          }
        }

        async pause() {
          if (this.audioCtx) await this.audioCtx.suspend()
        }

        async continue() {
          if (this.audioCtx) await this.audioCtx.resume()
        }

        flush() {
          if (!this.samples || this.samples.length === 0) return
          const self = this
          const bufferSource = this.audioCtx.createBufferSource()
          if (typeof this.option.onended === 'function') {
            bufferSource.onended = function (event) {
              self.option.onended(this, event)
            }
          }
          const length = this.samples.length / this.option.channels
          const audioBuffer = this.audioCtx.createBuffer(
            this.option.channels,
            length,
            this.option.sampleRate,
          )

          for (let channel = 0; channel < this.option.channels; channel++) {
            const audioData = audioBuffer.getChannelData(channel)
            let offset = channel
            let decrement = 50
            for (let i = 0; i < length; i++) {
              audioData[i] = this.samples[offset]
              if (i < 50) {
                audioData[i] = (audioData[i] * i) / 50
              }
              if (i >= length - 51) {
                audioData[i] = (audioData[i] * decrement--) / 50
              }
              offset += this.option.channels
            }
          }

          bufferSource.buffer = audioBuffer
          bufferSource.connect(this.gainNode)
          bufferSource.start(this.startTime ?? 0)
          this.startTime =
            (this.startTime ?? this.audioCtx.currentTime) + audioBuffer.duration

          this.samples = new Float32Array()
        }

        bindAudioContextEvent() {
          const self = this
          if (typeof self.option.onstatechange === 'function') {
            this.audioCtx.onstatechange = function (event) {
              if (self.audioCtx) {
                self.option.onstatechange(this, event, self.audioCtx.state)
              }
            }
          }
        }
      }

      // === UI 与流式播放(WebSocket + 结构化事件) ===
      const $text = document.getElementById('text')
      const $play = document.getElementById('playBtn')
      const $stop = document.getElementById('stopBtn')
      const $simulate = document.getElementById('simulateStream')
      const $status = document.getElementById('status')
      const $log = document.getElementById('log')

      let pcmPlayer = null
      let ws = null
      let pcmPlayerSampleRate = 24000
      const t0 = () => (typeof performance !== 'undefined' ? performance.now() : Date.now())
      const tStr = (t) => `+${(t / 1000).toFixed(2)}s`

      function log(line) {
        const ts = tStr(t0() - sessionStart)
        $log.textContent += `[${ts}] ${line}\n`
        $log.scrollTop = $log.scrollHeight
      }

      function setStatus(text, isError = false) {
        $status.textContent = text
        $status.classList.toggle('error', isError)
      }

      function setBusy(busy) {
        $play.disabled = busy
        $stop.disabled = !busy
      }

      let sessionStart = 0
      let audioFrameCount = 0
      let audioBytes = 0
      let chunkCount = 0

      function ensurePcmPlayer(sampleRate) {
        if (pcmPlayer && pcmPlayer.option.sampleRate === sampleRate) return
        if (pcmPlayer) pcmPlayer.destroy()
        pcmPlayer = new PCMPlayer({
          inputCodec: 'Int16',
          channels: 1,
          sampleRate,
          flushTime: 200,
        })
      }

      async function play() {
        const text = $text.value.trim()
        if (!text) {
          setStatus('请输入要合成的文本', true)
          return
        }

        setBusy(true)
        sessionStart = t0()
        audioFrameCount = 0
        audioBytes = 0
        chunkCount = 0
        $log.textContent = ''
        setStatus('连接中...')
        log('点击播放,开始建连')

        // 必须在用户点击事件内建 AudioContext(浏览器自动播放策略)
        ensurePcmPlayer(24000)
        if (pcmPlayer.audioCtx.state === 'suspended') {
          await pcmPlayer.audioCtx.resume()
        }

        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
        ws = new WebSocket(`${proto}//${location.host}/api/tts/ws`)
        ws.binaryType = 'arraybuffer'

        ws.onopen = () => {
          log('ws 已连接,发送 start')
          ws.send(
            JSON.stringify({
              type: 'start',
              text,
              simulateStream: $simulate.checked ? true : false,
            }),
          )
          setStatus('合成中...')
        }

        ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            // 音频帧(binary frame)
            audioFrameCount += 1
            audioBytes += e.data.byteLength
            ensurePcmPlayer(pcmPlayerSampleRate)
            pcmPlayer.feed(new Uint8Array(e.data))
            if (audioFrameCount === 1) {
              log(`🎵 第一个音频帧到达: ${e.data.byteLength} bytes,累计 ${(audioBytes/1024).toFixed(1)} KB`)
            } else if (audioFrameCount % 10 === 0) {
              log(`🎵 音频帧 #${audioFrameCount}: 累计 ${(audioBytes/1024).toFixed(1)} KB`)
            }
            setStatus(`合成中... 段 ${chunkCount}/音频帧 ${audioFrameCount}`)
            return
          }

          // 文本事件
          let msg
          try { msg = JSON.parse(e.data) } catch { return }
          switch (msg.type) {
            case 'session_start':
              pcmPlayerSampleRate = msg.sampleRate
              log(`📡 session_start: sampleRate=${msg.sampleRate} encoding=${msg.encoding}`)
              break
            case 'chunk':
              chunkCount = msg.index
              log(`📝 收到第 ${msg.index} 段文本 (${tStr(msg.at)}): "${msg.text.slice(0, 30)}${msg.text.length > 30 ? '...' : ''}"`)
              break
            case 'first_frame':
              log(`⚡ first_frame ${tStr(msg.at)} - 服务端推回首帧`)
              break
            case 'end':
              log(`✅ end: totalFrames=${msg.totalFrames} totalBytes=${(msg.totalBytes/1024).toFixed(1)} KB`)
              setStatus('合成完成,等待播放结束')
              break
            case 'error':
              log(`❌ error: ${msg.error}`)
              setStatus('出错:' + msg.error, true)
              break
            default:
              log(`? unknown event: ${JSON.stringify(msg)}`)
          }
        }

        ws.onerror = () => {
          log('❌ ws error')
          setStatus('WebSocket 出错', true)
        }

        ws.onclose = () => {
          log('🔌 ws closed')
          setBusy(false)
        }
      }

      function stop() {
        if (ws && ws.readyState === WebSocket.OPEN) ws.close()
        if (pcmPlayer) pcmPlayer.destroy()
        pcmPlayer = null
        setBusy(false)
        setStatus('已停止')
      }

      $play.addEventListener('click', play)
      $stop.addEventListener('click', stop)
    </script>
  </body>
</html>
